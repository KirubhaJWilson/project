<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ClinicaAI • Intelligent EHR with Patient Symptom Checker</title>
  <!-- Bootstrap 5 + Font Awesome + Chart.js + React -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #eef2f5; font-family: 'Segoe UI', system-ui; }
    .card-hover { transition: 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .risk-high { background: #ffebee; border-left: 5px solid #d32f2f; }
    .risk-mid { background: #fff8e1; border-left: 5px solid #f57c00; }
    .risk-low { background: #e8f5e9; border-left: 5px solid #2e7d32; }
    .image-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid #dee2e6; }
    .history-timeline { max-height: 250px; overflow-y: auto; font-size: 0.85rem; }
    .shap-bar { height: 8px; border-radius: 20px; background: #1F6E8C; }
    .nav-tabs .nav-link.active { background-color: #1F6E8C; color: white; border-color: #1F6E8C; }
    .nav-tabs .nav-link { color: #1F6E8C; }
    .symptom-badge { background: #e9ecef; padding: 5px 10px; border-radius: 20px; margin: 3px; display: inline-block; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  // --------------------------------------------------------------
  // 1. STORAGE KEYS & HELPERS (Clinicians + Patients + Images/History + Requests)
  // --------------------------------------------------------------
  const STORAGE_CLINICIANS = 'clinica_clinicians';
  const STORAGE_PATIENTS = 'clinica_patients';
  const STORAGE_SESSION = 'clinica_session';
  const STORAGE_REQUESTS = 'clinica_requests';

  // ---------- Clinician management ----------
  const loadClinicians = () => {
    const stored = localStorage.getItem(STORAGE_CLINICIANS);
    if (stored) return JSON.parse(stored);
    const defaultClinicians = [
      { id: 1, username: 'dr.smith', password: 'pass123', fullName: 'Dr. Emily Smith', role: 'Physician', createdAt: new Date().toISOString() }
    ];
    localStorage.setItem(STORAGE_CLINICIANS, JSON.stringify(defaultClinicians));
    return defaultClinicians;
  };
  const saveClinicians = (clinicians) => localStorage.setItem(STORAGE_CLINICIANS, JSON.stringify(clinicians));

  // ---------- Patient management ----------
  const generateInitialPatients = () => {
    const firstNames = ['James','Mary','John','Patricia','Robert','Jennifer','Michael','Linda','William','Elizabeth'];
    const lastNames = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez'];
    const conditions = ['Hypertension','Type 2 Diabetes','COPD','Heart Failure','Asthma','None','Hyperlipidemia'];
    const patients = [];
    for (let i = 1; i <= 20; i++) {
      const age = 25 + Math.floor(Math.random() * 60);
      const systolic = 100 + Math.floor(Math.random() * 60);
      const glucose = 70 + Math.floor(Math.random() * 120);
      const cholesterol = 150 + Math.floor(Math.random() * 100);
      const heartRate = 60 + Math.floor(Math.random() * 40);
      const bmi = 18 + Math.random() * 15;
      patients.push({
        id: i,
        name: `${firstNames[i % firstNames.length]} ${lastNames[i % lastNames.length]}`,
        age, gender: Math.random() > 0.5 ? 'Male' : 'Female',
        systolic, diastolic: systolic - 20 + Math.floor(Math.random() * 15),
        glucose, cholesterol, heartRate, bmi: parseFloat(bmi.toFixed(1)),
        condition: conditions[Math.floor(Math.random() * conditions.length)],
        attendingClinician: 'dr.smith',
        lastVisit: `2025-${Math.floor(Math.random() * 12)+1}-${Math.floor(Math.random() * 28)+1}`,
        wearableSteps: 3000 + Math.floor(Math.random() * 12000),
        wearableSleep: 5 + Math.random() * 4,
        history: [{ date: new Date().toISOString().slice(0,10), note: 'Initial record created', updatedBy: 'system' }],
        images: [],
        scans: []
      });
    }
    return patients;
  };

  const loadPatients = () => {
    const stored = localStorage.getItem(STORAGE_PATIENTS);
    if (stored) return JSON.parse(stored);
    const initial = generateInitialPatients();
    localStorage.setItem(STORAGE_PATIENTS, JSON.stringify(initial));
    return initial;
  };
  const savePatients = (patients) => localStorage.setItem(STORAGE_PATIENTS, JSON.stringify(patients));

  const addHistoryEntry = (patientId, note, clinicianUsername) => {
    const patients = loadPatients();
    const index = patients.findIndex(p => p.id === patientId);
    if (index !== -1) {
      const entry = { date: new Date().toISOString().slice(0,10), note, updatedBy: clinicianUsername, timestamp: Date.now() };
      if (!patients[index].history) patients[index].history = [];
      patients[index].history.push(entry);
      patients[index].lastVisit = entry.date;
      savePatients(patients);
      return true;
    }
    return false;
  };

  // ---------- Requests (patient -> clinician) ----------
  const loadRequests = () => {
    const stored = localStorage.getItem(STORAGE_REQUESTS);
    if (stored) return JSON.parse(stored);
    return [];
  };
  const saveRequests = (requests) => localStorage.setItem(STORAGE_REQUESTS, JSON.stringify(requests));

  const addRequest = (patientId, patientName, clinicianUsername, message) => {
    const requests = loadRequests();
    const newReq = {
      id: Date.now(),
      patientId,
      patientName,
      clinicianUsername,
      message,
      status: 'pending',
      createdAt: new Date().toISOString(),
      reply: null,
      repliedAt: null
    };
    requests.push(newReq);
    saveRequests(requests);
    return newReq;
  };

  const replyToRequest = (requestId, replyText, clinicianName) => {
    const requests = loadRequests();
    const reqIndex = requests.findIndex(r => r.id === requestId);
    if (reqIndex !== -1) {
      requests[reqIndex].status = 'answered';
      requests[reqIndex].reply = replyText;
      requests[reqIndex].repliedAt = new Date().toISOString();
      requests[reqIndex].repliedBy = clinicianName;
      saveRequests(requests);
      return true;
    }
    return false;
  };

  // Auto-sync simulation
  const autoSyncSimulation = (clinicianUsername) => {
    const patients = loadPatients();
    let updated = false;
    patients.forEach(p => {
      if (Math.random() < 0.25) {
        const syncNote = `Auto-sync: new lab result (simulated) at ${new Date().toLocaleTimeString()}`;
        if (!p.history) p.history = [];
        p.history.push({ date: new Date().toISOString().slice(0,10), note: syncNote, updatedBy: 'system_sync', timestamp: Date.now() });
        updated = true;
      }
    });
    if (updated) savePatients(patients);
  };

  // --------------------------------------------------------------
  // 2. ML ENSEMBLE PREDICTIONS + SYMPTOM CHECKER
  // --------------------------------------------------------------
  const predictEnsemble = (patient) => {
    const riskFactors = {
      ageScore: patient.age > 60 ? 0.7 : (patient.age > 45 ? 0.4 : 0.1),
      glucoseScore: patient.glucose > 140 ? 0.8 : (patient.glucose > 110 ? 0.4 : 0.1),
      bpScore: patient.systolic > 140 ? 0.6 : (patient.systolic > 130 ? 0.3 : 0.1),
      bmiScore: patient.bmi > 30 ? 0.5 : (patient.bmi > 25 ? 0.3 : 0.1),
      heartScore: patient.heartRate > 100 ? 0.4 : 0.1
    };
    const baseRisk = (riskFactors.ageScore * 0.3 + riskFactors.glucoseScore * 0.3 + 
                      riskFactors.bpScore * 0.2 + riskFactors.bmiScore * 0.1 + riskFactors.heartScore * 0.1);
    const rf = Math.min(0.95, baseRisk + (Math.random() * 0.08 - 0.04));
    const svm = Math.min(0.95, baseRisk * 1.05 + (Math.random() * 0.06 - 0.03));
    const nn = Math.min(0.95, baseRisk * 0.98 + (Math.random() * 0.1 - 0.05));
    const gb = Math.min(0.95, baseRisk + (Math.random() * 0.07));
    const ensemble = (rf + svm + nn + gb) / 4;
    const shapValues = [
      { feature: 'Age', value: riskFactors.ageScore },
      { feature: 'Glucose', value: riskFactors.glucoseScore },
      { feature: 'Systolic BP', value: riskFactors.bpScore },
      { feature: 'BMI', value: riskFactors.bmiScore },
      { feature: 'Heart Rate', value: riskFactors.heartScore }
    ];
    return { rf, svm, nn, gb, ensemble, shapValues };
  };

  const symptomDiseaseMap = {
    'fever': ['Influenza', 'COVID-19', 'Infection'],
    'cough': ['Influenza', 'COVID-19', 'Bronchitis', 'Asthma'],
    'fatigue': ['Anemia', 'Diabetes', 'Hypothyroidism', 'Depression'],
    'headache': ['Migraine', 'Hypertension', 'Tension headache'],
    'chest pain': ['Angina', 'Heart attack', 'GERD'],
    'shortness of breath': ['Asthma', 'COPD', 'Heart failure', 'COVID-19'],
    'joint pain': ['Arthritis', 'Lupus', 'Influenza'],
    'nausea': ['Gastritis', 'Food poisoning', 'Pregnancy'],
    'dizziness': ['Hypotension', 'Anemia', 'Vertigo'],
    'rash': ['Allergy', 'Eczema', 'Infection']
  };

  const predictDiseaseFromSymptoms = (symptomsList, patient) => {
    if (!symptomsList.length) return null;
    let diseaseScores = {};
    symptomsList.forEach(symptom => {
      const diseases = symptomDiseaseMap[symptom.toLowerCase()] || [];
      diseases.forEach(d => { diseaseScores[d] = (diseaseScores[d] || 0) + 1; });
    });
    if (patient && patient.condition !== 'None' && patient.condition) {
      diseaseScores[patient.condition] = (diseaseScores[patient.condition] || 0) + 2;
    }
    if (Object.keys(diseaseScores).length === 0) return "No clear match – consult clinician";
    const sorted = Object.entries(diseaseScores).sort((a,b) => b[1] - a[1]);
    return sorted[0][0];
  };

  // --------------------------------------------------------------
  // 3. AUTH CONTEXT
  // --------------------------------------------------------------
  const { useState, useEffect, createContext, useContext } = React;

  const AuthContext = createContext(null);

  const AuthProvider = ({ children }) => {
    const [clinician, setClinician] = useState(null);
    useEffect(() => {
      const session = localStorage.getItem(STORAGE_SESSION);
      if (session) {
        const parsed = JSON.parse(session);
        const clinicians = loadClinicians();
        const found = clinicians.find(c => c.id === parsed.id);
        if (found) setClinician(found);
      }
    }, []);

    const login = (username, password) => {
      const clinicians = loadClinicians();
      const user = clinicians.find(c => c.username === username && c.password === password);
      if (user) {
        setClinician(user);
        localStorage.setItem(STORAGE_SESSION, JSON.stringify({ id: user.id, username: user.username }));
        return true;
      }
      return false;
    };

    const register = (username, password, fullName, role) => {
      const clinicians = loadClinicians();
      if (clinicians.find(c => c.username === username)) return false;
      const newId = clinicians.length > 0 ? Math.max(...clinicians.map(c=>c.id)) + 1 : 1;
      const newClinician = { id: newId, username, password, fullName, role, createdAt: new Date().toISOString() };
      clinicians.push(newClinician);
      saveClinicians(clinicians);
      return true;
    };

    const logout = () => {
      setClinician(null);
      localStorage.removeItem(STORAGE_SESSION);
    };

    return (
      <AuthContext.Provider value={{ clinician, login, register, logout }}>
        {children}
      </AuthContext.Provider>
    );
  };

  const useAuth = () => useContext(AuthContext);

  // --------------------------------------------------------------
  // 4. INTEROPERABILITY LOG COMPONENT
  // --------------------------------------------------------------
  const InteroperabilityLog = () => {
    const [logs, setLogs] = useState([]);
    useEffect(() => {
      setLogs([
        { time: new Date().toLocaleTimeString(), msg: 'FHIR GET /Patient - 200 OK' },
        { time: new Date().toLocaleTimeString(), msg: 'HL7 v2 ADT^A01 received, mapped to internal schema' },
        { time: new Date().toLocaleTimeString(), msg: 'Data cleaning: outlier removal for HR > 180' },
        { time: new Date().toLocaleTimeString(), msg: 'Encryption & audit: TLS 1.3, HIPAA compliance active' }
      ]);
    }, []);
    return (
      <div className="border rounded p-3 bg-light">
        <h6><i className="fas fa-exchange-alt"></i> Interoperability (FHIR/HL7) events</h6>
        <ul className="list-unstyled small">
          {logs.map((l,idx)=> <li key={idx}><i className="fas fa-check-circle text-success me-2"></i> {l.time} - {l.msg}</li>)}
        </ul>
      </div>
    );
  };

  // --------------------------------------------------------------
  // 5. CLINICIAN DASHBOARD (unchanged, but included)
  // --------------------------------------------------------------
  const ClinicianDashboard = ({ clinician, onRefresh }) => {
    const [patients, setPatients] = useState([]);
    const [search, setSearch] = useState('');
    const [selectedPatient, setSelectedPatient] = useState(null);
    const [showImageModal, setShowImageModal] = useState(false);
    const [currentImages, setCurrentImages] = useState([]);
    const [imageType, setImageType] = useState('');
    const [requests, setRequests] = useState([]);

    const refresh = () => {
      setPatients(loadPatients());
      setRequests(loadRequests().filter(r => r.clinicianUsername === clinician.username));
      if (onRefresh) onRefresh();
    };
    useEffect(() => { refresh(); }, [clinician]);

    const handleAddPatient = (e) => {
      e.preventDefault();
      const form = e.target;
      const newPatient = {
        id: Date.now(),
        name: form.name.value,
        age: parseInt(form.age.value),
        gender: form.gender.value,
        condition: form.condition.value,
        attendingClinician: clinician.username,
        systolic: 120, glucose: 100, heartRate: 75, bmi: 24,
        wearableSteps: 5000, wearableSleep: 7,
        lastVisit: new Date().toISOString().slice(0,10),
        history: [{ date: new Date().toISOString().slice(0,10), note: 'Patient record created', updatedBy: clinician.username }],
        images: [],
        scans: []
      };
      const patientsList = loadPatients();
      patientsList.push(newPatient);
      savePatients(patientsList);
      refresh();
      bootstrap.Modal.getInstance(document.getElementById('addPatientModal')).hide();
      form.reset();
    };

    const handleUpdatePatient = (e) => {
      e.preventDefault();
      const form = e.target;
      const updatedData = {
        name: form.name.value,
        age: parseInt(form.age.value),
        gender: form.gender.value,
        condition: form.condition.value,
        systolic: parseInt(form.systolic.value),
        glucose: parseInt(form.glucose.value),
        heartRate: parseInt(form.heartRate.value),
        bmi: parseFloat(form.bmi.value),
        wearableSteps: parseInt(form.wearableSteps.value),
        wearableSleep: parseFloat(form.wearableSleep.value),
        attendingClinician: form.attendingClinician.value
      };
      let patientsList = loadPatients();
      patientsList = patientsList.map(p => p.id === selectedPatient.id ? { ...p, ...updatedData } : p);
      savePatients(patientsList);
      addHistoryEntry(selectedPatient.id, `Clinical data updated by ${clinician.username}`, clinician.username);
      refresh();
      bootstrap.Modal.getInstance(document.getElementById('editPatientModal')).hide();
      setSelectedPatient(null);
    };

    const handleDeletePatient = (id) => {
      if (window.confirm('Permanently delete patient and all records?')) {
        let patientsList = loadPatients();
        patientsList = patientsList.filter(p => p.id !== id);
        savePatients(patientsList);
        refresh();
      }
    };

    const handleAddHistory = (patientId, note) => {
      if (note.trim()) {
        addHistoryEntry(patientId, note, clinician.username);
        refresh();
      }
    };

    const handleAddImage = (patientId, fileInput, type) => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const patientsList = loadPatients();
        const patientIndex = patientsList.findIndex(p => p.id === patientId);
        if (patientIndex !== -1) {
          const newAsset = { id: Date.now().toString(), name: file.name, data: e.target.result, type: type === 'image' ? 'X-ray/Image' : 'Scan' };
          if (type === 'image') {
            if (!patientsList[patientIndex].images) patientsList[patientIndex].images = [];
            patientsList[patientIndex].images.push(newAsset);
          } else {
            if (!patientsList[patientIndex].scans) patientsList[patientIndex].scans = [];
            patientsList[patientIndex].scans.push(newAsset);
          }
          savePatients(patientsList);
          refresh();
          alert('File attached successfully');
        }
      };
      reader.readAsDataURL(file);
    };

    const viewImages = (patient, type) => {
      const images = type === 'image' ? (patient.images || []) : (patient.scans || []);
      setCurrentImages(images);
      setImageType(type);
      setSelectedPatient(patient);
      setShowImageModal(true);
    };

    const handleReplyRequest = (req, replyText) => {
      if (replyText.trim()) {
        replyToRequest(req.id, replyText, clinician.fullName);
        refresh();
        alert('Reply sent to patient portal.');
      }
    };

    const filtered = patients.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));

    return (
      <div>
        <div className="d-flex justify-content-between flex-wrap mb-3 gap-2">
          <div className="input-group w-auto">
            <span className="input-group-text"><i className="fas fa-search"></i></span>
            <input type="text" className="form-control" placeholder="Search patient..." value={search} onChange={e=>setSearch(e.target.value)} />
          </div>
          <button className="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPatientModal"><i className="fas fa-plus"></i> New Patient</button>
        </div>

        {requests.filter(r => r.status === 'pending').length > 0 && (
          <div className="card mb-4 border-warning">
            <div className="card-header bg-warning text-dark"><i className="fas fa-comment-medical"></i> Pending Patient Requests</div>
            <div className="card-body">
              {requests.filter(r => r.status === 'pending').map(req => (
                <div key={req.id} className="border-bottom pb-2 mb-2">
                  <strong>{req.patientName}</strong> <small className="text-muted">{new Date(req.createdAt).toLocaleString()}</small>
                  <p className="mb-1">Message: {req.message}</p>
                  <div className="input-group input-group-sm">
                    <input type="text" className="form-control" placeholder="Your suggestion/reply..." id={`reply-${req.id}`} />
                    <button className="btn btn-success btn-sm" onClick={() => { const inp = document.getElementById(`reply-${req.id}`); handleReplyRequest(req, inp.value); inp.value = ''; }}>Send Reply</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="row">
          {filtered.map(patient => {
            const pred = predictEnsemble(patient);
            const riskClass = pred.ensemble > 0.6 ? 'risk-high' : (pred.ensemble > 0.3 ? 'risk-mid' : 'risk-low');
            return (
              <div className="col-md-6 col-lg-4 mb-3" key={patient.id}>
                <div className={`card h-100 shadow-sm ${riskClass}`}>
                  <div className="card-body">
                    <h5 className="card-title">{patient.name} <span className="badge bg-secondary">ID: {patient.id}</span></h5>
                    <p className="card-text">
                      <i className="fas fa-venus-mars"></i> {patient.gender} | Age {patient.age}<br/>
                      <strong>Condition:</strong> {patient.condition}<br/>
                      <i className="fas fa-user-md"></i> Attending: {patient.attendingClinician}<br/>
                      <strong>Risk Score:</strong> <span className="badge" style={{background: pred.ensemble>0.6?'#d32f2f': pred.ensemble>0.3?'#f57c00':'#2e7d32'}}>{(pred.ensemble*100).toFixed(1)}%</span>
                    </p>
                    <div className="d-flex flex-wrap gap-2 mb-2">
                      <button className="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editPatientModal" onClick={() => setSelectedPatient(patient)}><i className="fas fa-edit"></i> Edit</button>
                      <button className="btn btn-sm btn-outline-danger" onClick={() => handleDeletePatient(patient.id)}><i className="fas fa-trash"></i> Delete</button>
                      <button className="btn btn-sm btn-outline-info" data-bs-toggle="modal" data-bs-target="#historyModal" onClick={() => setSelectedPatient(patient)}><i className="fas fa-history"></i> History</button>
                      <button className="btn btn-sm btn-secondary" onClick={() => viewImages(patient, 'image')}><i className="fas fa-x-ray"></i> X-rays ({patient.images?.length || 0})</button>
                      <button className="btn btn-sm btn-secondary" onClick={() => viewImages(patient, 'scan')}><i className="fas fa-microscope"></i> Scans ({patient.scans?.length || 0})</button>
                    </div>
                    <div className="mt-2">
                      <div className="input-group input-group-sm">
                        <input type="text" className="form-control" placeholder="Add clinical note..." id={`note-${patient.id}`} />
                        <button className="btn btn-outline-success" onClick={() => { const inp = document.getElementById(`note-${patient.id}`); handleAddHistory(patient.id, inp.value); inp.value = ''; }}><i className="fas fa-save"></i> Add</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Modals (same as before) */}
        <div className="modal fade" id="addPatientModal" tabIndex="-1"><div className="modal-dialog"><div className="modal-content">
          <div className="modal-header"><h5>New Patient Record</h5><button type="button" className="btn-close" data-bs-dismiss="modal"></button></div>
          <form onSubmit={handleAddPatient}><div className="modal-body">
            <input type="text" name="name" className="form-control mb-2" placeholder="Full Name" required />
            <input type="number" name="age" className="form-control mb-2" placeholder="Age" required />
            <select name="gender" className="form-select mb-2" required><option>Male</option><option>Female</option><option>Other</option></select>
            <input type="text" name="condition" className="form-control mb-2" placeholder="Primary condition" />
          </div><div className="modal-footer"><button type="submit" className="btn btn-primary">Create Patient</button></div></form>
        </div></div></div>

        <div className="modal fade" id="editPatientModal" tabIndex="-1"><div className="modal-dialog"><div className="modal-content">
          <div className="modal-header"><h5>Edit Patient & Clinical Data</h5><button type="button" className="btn-close" data-bs-dismiss="modal"></button></div>
          {selectedPatient && <form onSubmit={handleUpdatePatient}><div className="modal-body">
            <input type="text" name="name" defaultValue={selectedPatient.name} className="form-control mb-2" required />
            <input type="number" name="age" defaultValue={selectedPatient.age} className="form-control mb-2" required />
            <select name="gender" defaultValue={selectedPatient.gender} className="form-select mb-2"><option>Male</option><option>Female</option><option>Other</option></select>
            <input type="text" name="condition" defaultValue={selectedPatient.condition} className="form-control mb-2" />
            <select name="attendingClinician" className="form-select mb-2">
              {loadClinicians().map(c => <option key={c.username} value={c.username} selected={c.username === selectedPatient.attendingClinician}>{c.fullName} ({c.username})</option>)}
            </select>
            <hr /><h6>Clinical Parameters</h6>
            <input type="number" name="systolic" defaultValue={selectedPatient.systolic} className="form-control mb-2" placeholder="Systolic BP" />
            <input type="number" name="glucose" defaultValue={selectedPatient.glucose} className="form-control mb-2" placeholder="Glucose (mg/dL)" />
            <input type="number" name="heartRate" defaultValue={selectedPatient.heartRate} className="form-control mb-2" placeholder="Heart Rate" />
            <input type="number" step="0.1" name="bmi" defaultValue={selectedPatient.bmi} className="form-control mb-2" placeholder="BMI" />
            <input type="number" name="wearableSteps" defaultValue={selectedPatient.wearableSteps} className="form-control mb-2" placeholder="Daily Steps" />
            <input type="number" step="0.1" name="wearableSleep" defaultValue={selectedPatient.wearableSleep} className="form-control mb-2" placeholder="Sleep Hours" />
          </div><div className="modal-footer"><button type="submit" className="btn btn-primary">Save changes</button></div></form>}
        </div></div></div>

        <div className="modal fade" id="historyModal" tabIndex="-1"><div className="modal-dialog"><div className="modal-content">
          <div className="modal-header"><h5>Patient History Log</h5><button type="button" className="btn-close" data-bs-dismiss="modal"></button></div>
          <div className="modal-body">
            {selectedPatient && (
              <div className="history-timeline">
                {selectedPatient.history && selectedPatient.history.slice().reverse().map((h, idx) => (
                  <div key={idx} className="border-bottom pb-2 mb-2">
                    <strong>{h.date}</strong> <span className="text-muted">by {h.updatedBy}</span>
                    <p className="mb-0">{h.note}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div></div></div>

        <div className="modal fade" id="imageViewerModal" tabIndex="-1"><div className="modal-dialog modal-lg"><div className="modal-content">
          <div className="modal-header"><h5>{imageType === 'image' ? 'X-rays & Images' : 'Scans'}</h5><button type="button" className="btn-close" data-bs-dismiss="modal"></button></div>
          <div className="modal-body">
            <div className="row">
              {currentImages.map(img => (
                <div className="col-6 col-md-4 mb-3" key={img.id}>
                  <img src={img.data} className="img-fluid rounded border" style={{height: '150px', width: '100%', objectFit: 'cover'}}/>
                  <div className="small text-muted">{img.name}</div>
                </div>
              ))}
            </div>
            {selectedPatient && (
              <div><hr /><label>Attach new {imageType}:</label><input type="file" className="form-control mb-2" accept="image/*" id="uploadAsset" />
              <button className="btn btn-sm btn-primary" onClick={() => { const inp = document.getElementById('uploadAsset'); handleAddImage(selectedPatient.id, inp, imageType); }}>Upload</button></div>
            )}
          </div>
        </div></div></div>
      </div>
    );
  };

  // --------------------------------------------------------------
  // 6. PATIENT PORTAL (FIXED: now shows patients correctly)
  // --------------------------------------------------------------
  const PatientPortal = ({ patients }) => {
    const [selectedId, setSelectedId] = useState(null);
    const [symptomsInput, setSymptomsInput] = useState('');
    const [predictedDisease, setPredictedDisease] = useState(null);
    const [requestMsg, setRequestMsg] = useState('');
    const [requestStatus, setRequestStatus] = useState(null);
    const [pendingReply, setPendingReply] = useState(null);

    // When patients list changes, auto-select the first patient
    useEffect(() => {
      if (patients && patients.length > 0 && !selectedId) {
        setSelectedId(patients[0].id);
      }
    }, [patients, selectedId]);

    const patient = patients?.find(p => p.id === selectedId);
    const requests = loadRequests().filter(r => r.patientId === selectedId);

    useEffect(() => {
      if (patient) {
        const latestReply = requests.find(r => r.status === 'answered');
        setPendingReply(latestReply || null);
      }
    }, [selectedId, patients]);

    // If no patients exist at all
    if (!patients || patients.length === 0) {
      return (
        <div className="alert alert-warning text-center">
          <i className="fas fa-exclamation-triangle"></i> No patients found. Please ask your clinician to add you to the system.
        </div>
      );
    }

    // If patient not found (maybe deleted after selection)
    if (!patient) {
      return (
        <div className="alert alert-info text-center">
          Please select a valid patient from the dropdown.
        </div>
      );
    }

    const pred = predictEnsemble(patient);

    const handleSymptomCheck = () => {
      const symptoms = symptomsInput.split(',').map(s => s.trim().toLowerCase()).filter(s => s);
      const disease = predictDiseaseFromSymptoms(symptoms, patient);
      setPredictedDisease(disease);
    };

    const handleRequestSuggestion = () => {
      if (!requestMsg.trim()) return alert("Please enter your question.");
      if (!patient.attendingClinician) return alert("No attending clinician assigned.");
      addRequest(patient.id, patient.name, patient.attendingClinician, requestMsg);
      setRequestStatus("Request sent! Your clinician will reply within a day.");
      setRequestMsg('');
      setTimeout(() => setRequestStatus(null), 5000);
    };

    return (
      <div>
        <label className="form-label fw-bold">Select your profile:</label>
        <select className="form-select mb-3" value={selectedId} onChange={e=>setSelectedId(Number(e.target.value))}>
          {patients.map(p => <option key={p.id} value={p.id}>{p.name} (ID {p.id})</option>)}
        </select>

        <div className="row">
          <div className="col-md-6">
            <div className="card mb-3"><div className="card-body"><h5><i className="fas fa-user-md"></i> Your Clinical Summary</h5>
              <p><strong>Age:</strong> {patient.age} | <strong>BMI:</strong> {patient.bmi} | <strong>Condition:</strong> {patient.condition}</p>
              <p><strong>Glucose:</strong> {patient.glucose} mg/dL | <strong>BP:</strong> {patient.systolic}/{patient.diastolic} mmHg</p>
              <p><strong>Heart Rate:</strong> {patient.heartRate} bpm | <strong>Attending:</strong> {patient.attendingClinician}</p>
              <div>Readmission risk: <strong>{(pred.ensemble*100).toFixed(1)}%</strong></div>
            </div></div>
          </div>
          <div className="col-md-6">
            <div className="card mb-3"><div className="card-body"><h5><i className="fas fa-heartbeat"></i> Wearable Trends</h5>
              <p>📊 Daily Steps: {patient.wearableSteps} &nbsp; 💤 Sleep: {patient.wearableSleep.toFixed(1)} hrs</p>
              <div className="progress mb-2"><div className="progress-bar bg-info" style={{width: `${Math.min(100, patient.wearableSteps/150)}%`}}>Activity</div></div>
            </div></div>
          </div>
        </div>

        {/* Full Health History Timeline */}
        <div className="card mb-3"><div className="card-body"><h5><i className="fas fa-history"></i> Your Complete Health History</h5>
          <div className="history-timeline" style={{maxHeight: '300px'}}>
            {patient.history && patient.history.slice().reverse().map((h, idx) => (
              <div key={idx} className="border-bottom pb-2 mb-2">
                <strong>{h.date}</strong> <span className="text-muted">by {h.updatedBy}</span>
                <p className="mb-0">{h.note}</p>
              </div>
            ))}
            {(!patient.history || patient.history.length === 0) && <p>No previous records.</p>}
          </div>
          {patient.images?.length > 0 && <div className="mt-2"><i className="fas fa-x-ray"></i> You have {patient.images.length} X-ray(s) and {patient.scans?.length || 0} scan(s) on file.</div>}
        </div></div>

        {/* Symptom Checker */}
        <div className="card mb-3"><div className="card-body"><h5><i className="fas fa-stethoscope"></i> Symptom Checker (AI Prediction)</h5>
          <div className="mb-2">
            <label>Enter symptoms (comma separated): e.g., fever, cough, headache</label>
            <input type="text" className="form-control" value={symptomsInput} onChange={e=>setSymptomsInput(e.target.value)} placeholder="fever, fatigue, shortness of breath" />
          </div>
          <button className="btn btn-primary me-2" onClick={handleSymptomCheck}>Predict Disease</button>
          {predictedDisease && (
            <div className="alert alert-info mt-3"><i className="fas fa-microbe"></i> Based on your symptoms and history, possible condition: <strong>{predictedDisease}</strong>. Please consult your clinician.</div>
          )}
        </div></div>

        {/* Request Suggestion from Clinician */}
        <div className="card"><div className="card-body"><h5><i className="fas fa-comment-dots"></i> Request a Suggestion from Your Clinician</h5>
          <textarea className="form-control mb-2" rows="2" placeholder="Describe your concern or question..." value={requestMsg} onChange={e=>setRequestMsg(e.target.value)}></textarea>
          <button className="btn btn-success" onClick={handleRequestSuggestion}>Send Request (reply within a day)</button>
          {requestStatus && <div className="alert alert-success mt-2">{requestStatus}</div>}
          {pendingReply && (
            <div className="alert alert-secondary mt-3">
              <strong>Clinician's reply ({new Date(pendingReply.repliedAt).toLocaleString()}):</strong><br/>
              {pendingReply.reply}
            </div>
          )}
        </div></div>
      </div>
    );
  };

  // --------------------------------------------------------------
  // 7. EXPLAINABLE AI PANEL
  // --------------------------------------------------------------
  const ExplainableAIPanel = ({ patients }) => {
    const [selectedId, setSelectedId] = useState(null);
    useEffect(() => {
      if (patients && patients.length > 0 && !selectedId) {
        setSelectedId(patients[0].id);
      }
    }, [patients, selectedId]);
    const patient = patients?.find(p => p.id === selectedId);
    if (!patient) return <div className="text-muted">Select a patient</div>;
    const { shapValues } = predictEnsemble(patient);
    return (
      <div>
        <label className="form-label">Select patient:</label>
        <select className="form-select mb-3" value={selectedId} onChange={e=>setSelectedId(Number(e.target.value))}>
          {patients.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <div className="card p-3">
          <h6>Feature impact on risk prediction (SHAP simulation)</h6>
          {shapValues.map(f => (
            <div key={f.feature} className="mb-2">
              <span>{f.feature}</span>
              <div className="shap-bar" style={{width: `${f.value*100}%`}}></div>
              <small>importance: {(f.value*100).toFixed(0)}%</small>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // --------------------------------------------------------------
  // 8. MAIN APP WITH TABS & AUTO SYNC
  // --------------------------------------------------------------
  const Dashboard = () => {
    const { clinician, logout } = useAuth();
    const [activeTab, setActiveTab] = useState('dashboard');
    const [syncMsg, setSyncMsg] = useState('');
    const [patients, setPatients] = useState([]);
    const refreshPatients = () => setPatients(loadPatients());

    useEffect(() => {
      refreshPatients();
      const interval = setInterval(() => {
        autoSyncSimulation(clinician.username);
        refreshPatients();
        setSyncMsg(`Auto-sync at ${new Date().toLocaleTimeString()}`);
        setTimeout(() => setSyncMsg(''), 3000);
      }, 30000);
      return () => clearInterval(interval);
    }, [clinician]);

    return (
      <div className="container-fluid px-3 py-3">
        <nav className="navbar navbar-light bg-white rounded-3 shadow-sm mb-4 p-3">
          <div><span className="navbar-brand"><i className="fas fa-hospital-user"></i> ClinicaAI · Intelligent EHR</span>
            <span className="badge bg-info ms-2">Clinician: {clinician?.fullName} ({clinician?.username})</span>
          </div>
          <button className="btn btn-outline-secondary" onClick={logout}><i className="fas fa-sign-out-alt"></i> Logout</button>
        </nav>
        {syncMsg && <div className="alert alert-success alert-dismissible fade show">{syncMsg} <i className="fas fa-sync-alt"></i></div>}
        
        <ul className="nav nav-tabs mb-3">
          <li className="nav-item"><button className={`nav-link ${activeTab==='dashboard'?'active':''}`} onClick={()=>setActiveTab('dashboard')}><i className="fas fa-chalkboard-user"></i> Clinician Dashboard</button></li>
          <li className="nav-item"><button className={`nav-link ${activeTab==='portal'?'active':''}`} onClick={()=>setActiveTab('portal')}><i className="fas fa-user-check"></i> Patient Portal</button></li>
          <li className="nav-item"><button className={`nav-link ${activeTab==='interop'?'active':''}`} onClick={()=>setActiveTab('interop')}><i className="fas fa-network-wired"></i> Interoperability</button></li>
          <li className="nav-item"><button className={`nav-link ${activeTab==='explain'?'active':''}`} onClick={()=>setActiveTab('explain')}><i className="fas fa-microscope"></i> Explainable AI</button></li>
        </ul>

        {activeTab === 'dashboard' && <ClinicianDashboard clinician={clinician} onRefresh={refreshPatients} />}
        {activeTab === 'portal' && <PatientPortal patients={patients} />}
        {activeTab === 'interop' && <InteroperabilityLog />}
        {activeTab === 'explain' && <ExplainableAIPanel patients={patients} />}
        
        <footer className="text-center text-muted mt-4 small">
          <i className="fas fa-database"></i> Data stored locally | Auto-sync | ML risk & symptom prediction | Clinician replies within a day
        </footer>
      </div>
    );
  };

  // --------------------------------------------------------------
  // 9. LOGIN / REGISTER SCREENS
  // --------------------------------------------------------------
  const LoginScreen = () => {
    const { login, register } = useAuth();
    const [isLogin, setIsLogin] = useState(true);
    const [error, setError] = useState('');

    const handleSubmit = (e) => {
      e.preventDefault();
      if (isLogin) {
        const username = e.target.username.value;
        const pwd = e.target.password.value;
        const success = login(username, pwd);
        if (!success) setError('Invalid credentials');
        else setError('');
      } else {
        const username = e.target.username.value;
        const pwd = e.target.password.value;
        const fullName = e.target.fullName.value;
        const role = e.target.role.value;
        const success = register(username, pwd, fullName, role);
        if (!success) setError('Username exists');
        else { setError(''); setIsLogin(true); }
      }
    };

    return (
      <div className="container d-flex justify-content-center align-items-center min-vh-100">
        <div className="card shadow-lg p-4" style={{ maxWidth: '450px' }}>
          <h2 className="text-center mb-4"><i className="fas fa-user-md"></i> ClinicaAI</h2>
          <ul className="nav nav-tabs mb-3">
            <li className="nav-item"><button className={`nav-link ${isLogin ? 'active' : ''}`} onClick={() => { setIsLogin(true); setError(''); }}>Login</button></li>
            <li className="nav-item"><button className={`nav-link ${!isLogin ? 'active' : ''}`} onClick={() => { setIsLogin(false); setError(''); }}>Register</button></li>
          </ul>
          <form onSubmit={handleSubmit}>
            {!isLogin && <input type="text" name="fullName" className="form-control mb-2" placeholder="Full Name" required />}
            <input type="text" name="username" className="form-control mb-2" placeholder="Username" required />
            <input type="password" name="password" className="form-control mb-2" placeholder="Password" required />
            {!isLogin && (<select name="role" className="form-select mb-2"><option>Physician</option><option>Nurse</option><option>Radiologist</option><option>Admin</option></select>)}
            {error && <div className="alert alert-danger py-1">{error}</div>}
            <button type="submit" className="btn btn-primary w-100">{isLogin ? 'Sign In' : 'Create Account'}</button>
          </form>
        </div>
      </div>
    );
  };

  const App = () => {
    const { clinician } = useAuth();
    return clinician ? <Dashboard /> : <LoginScreen />;
  };

  ReactDOM.createRoot(document.getElementById('root')).render(
    <AuthProvider>
      <App />
    </AuthProvider>
  );
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
